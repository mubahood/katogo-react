# Nginx config for https://movies.ugnews24.info
# Deploy: copy dist/ contents to /var/www/movies.ugnews24.info/

server {
    listen 80;
    server_name movies.ugnews24.info;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name movies.ugnews24.info;

    root /var/www/movies.ugnews24.info;
    index index.html;

    # SSL — managed by Certbot or similar
    ssl_certificate     /etc/letsencrypt/live/movies.ugnews24.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movies.ugnews24.info/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml application/atom+xml image/svg+xml;

    # Brotli (if ngx_brotli module installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript image/svg+xml;

    # Cache hashed assets forever (Vite adds content hash to filename)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache static public files for 1 week
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Never cache service worker or manifest
    location ~* (service-worker\.js|manifest\.json)$ {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Never cache index.html (SPA entry point)
    location = /index.html {
        expires 0;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block dot-files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
